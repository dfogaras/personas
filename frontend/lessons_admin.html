<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Órák — kincskereso.ai</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎭</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-brand">kincskereso.ai</a>
        <div class="nav-lesson" id="navLesson" style="display:none"></div>
        <div class="nav-dropdown" id="navDropdown" style="display:none">
            <button class="nav-dropdown-trigger" id="navDropdownTrigger">
                <span id="navContextLabel"></span><span class="nav-dropdown-caret">▾</span>
            </button>
            <div class="nav-dropdown-menu" id="navDropdownMenu">
                <a class="nav-dropdown-item" id="navMyPage" href="/#page=me"></a>
                <a class="nav-dropdown-item" id="navLessonPage" href="/" style="display:none"></a>
                <a class="nav-dropdown-item" id="navGeneralAdminPage" href="/" style="display:none"></a>
                <a class="nav-dropdown-item" id="navLessonsAdminPage" href="/" style="display:none"></a>
                <button class="nav-dropdown-item nav-dropdown-logout" id="navLogoutBtn">Kijelentkezés</button>
            </div>
        </div>
    </nav>

    <div class="page-content admin-content">
<div class="auth-error" id="lessonsError" style="display:none"></div>
        <section style="margin-bottom: 2rem;">
            <h2 class="admin-section-title">Csoportok</h2>
            <div id="groupsSection"><p class="loading">Betöltés...</p></div>
        </section>
        <section>
            <div class="lessons-header">
                <h2 class="admin-section-title">Órák</h2>
                <button class="admin-btn save-btn" id="newLessonBtn">+ Új óra</button>
            </div>
            <div id="lessonsList"><p class="loading">Betöltés...</p></div>
        </section>
    </div>

    <!-- Lesson editor modal (create / edit / remix) -->
    <div id="lessonModal" class="modal-overlay" style="display:none">
        <div class="modal lesson-modal">
            <h2 class="modal-title" id="lessonModalTitle">Új óra létrehozása</h2>

            <div class="modal-compact-row">
                <span class="modal-compact-title">Név</span>
                <input id="lessonName" class="admin-input" type="text" placeholder="pl. Matematika — 6B" style="flex:1">
            </div>

            <div class="prompt-card">
                <button type="button" class="prompt-toggle" id="lessonSystemPromptToggle">
                    <span>Perszóna sablon</span>
                    <span class="prompt-toggle-caret">▾</span>
                </button>
                <div class="prompt-collapsible" id="lessonSystemPromptCollapsible" style="display:none">
                    <div class="modal-hint" style="margin-bottom:6px">Változók: <code>{name}</code>, <code>{short}</code>, <code>{long}</code></div>
                    <textarea id="lessonSystemPrompt" class="admin-textarea" rows="12"></textarea>
                </div>
            </div>

            <div class="prompt-card">
                <button type="button" class="prompt-toggle" id="lessonTeacherSystemPromptToggle">
                    <span id="teacherSystemPromptLabel"></span>
                    <span class="prompt-toggle-caret">▾</span>
                </button>
                <div class="prompt-collapsible" id="lessonTeacherSystemPromptCollapsible" style="display:none">
                    <div class="modal-hint" style="margin-bottom:6px">Változók: <code>{name}</code>, <code>{short}</code>, <code>{long}</code></div>
                    <textarea id="lessonTeacherSystemPrompt" class="admin-textarea" rows="12"></textarea>
                </div>
            </div>

            <div class="modal-compact-row">
                <span class="modal-compact-title">AI</span>
                <div class="modal-compact-group">
                    <label class="modal-compact-label">Modell</label>
                    <div class="model-select" id="lessonAiModelSelect">
                        <button type="button" class="model-select-trigger admin-input" id="lessonAiModelTrigger">
                            <span id="lessonAiModelLabel">Gemini 2.5 Flash Lite</span>
                            <span class="model-select-caret">▾</span>
                        </button>
                        <div class="model-select-menu" id="lessonAiModelMenu"></div>
                    </div>
                    <input type="hidden" id="lessonAiModel" value="google/gemini-2.5-flash-lite">
                </div>
                <div class="modal-compact-group">
                    <label class="modal-compact-label">Hőmérséklet <span class="modal-label-info" data-tooltip="0 = kiszámítható, szó szerint követi az utasításokat. 1 = kreatív és változatos.">ⓘ</span></label>
                    <input id="lessonAiTemperature" class="admin-input admin-input-sm" type="number" min="0" max="1" step="0.1" value="1.0">
                </div>
            </div>

            <div class="modal-compact-row">
                <span class="modal-compact-title">Limitek</span>
                <div class="modal-compact-group">
                    <input id="lessonMaxMessages" class="admin-input admin-input-sm" type="number" min="1" max="999" value="60">
                    <label class="modal-compact-label" for="lessonMaxMessages">üzenet/chat</label>
                </div>
                <div class="modal-compact-group">
                    <input id="lessonMaxPersonas" class="admin-input admin-input-sm" type="number" min="1" max="100" value="10">
                    <label class="modal-compact-label" for="lessonMaxPersonas">perszóna/felhasználó</label>
                </div>
            </div>

            <div class="modal-compact-row">
                <span class="modal-compact-title" style="white-space:nowrap">Tanuló módosíthatja</span>
                <label class="modal-check-pill">
                    <input type="checkbox" id="lessonCanCreatePersonas" checked>
                    <span class="modal-compact-label">Perszónát</span>
                </label>
                <label class="modal-check-pill">
                    <input type="checkbox" id="lessonCanSetModel">
                    <span class="modal-compact-label">AI modellt</span>
                </label>
                <label class="modal-check-pill">
                    <input type="checkbox" id="lessonCanSetTemperature">
                    <span class="modal-compact-label">AI hőmérsékletet</span>
                </label>
            </div>

            <div class="modal-compact-row">
                <span class="modal-compact-title">Perszóna megjelenítés</span>
                <div class="modal-compact-group">
                    <label class="modal-compact-label" for="lessonPersonaSortOrder">Sorrend</label>
                    <select id="lessonPersonaSortOrder" class="admin-input" style="width: 140px;">
                        <option value="recency">Legújabb</option>
                        <option value="likes">Legtöbb like</option>
                        <option value="random">Véletlenszerű</option>
                    </select>
                </div>
                <label class="modal-check-pill">
                    <input type="checkbox" id="lessonPersonasPinnedFirst" checked>
                    <span class="modal-compact-label">Kitűzöttek az elején</span>
                </label>
            </div>

            <div class="auth-error" id="lessonModalError" style="display:none"></div>
            <div class="modal-actions">
                <button id="lessonSubmitBtn" class="admin-btn save-btn">Létrehozás</button>
                <button id="lessonCancelBtn" class="admin-btn cancel-btn">Mégse</button>
            </div>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/lessons_admin.js"></script>
</body>
</html>
