<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Órák — kincskereso.ai</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎭</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-brand">kincskereso.ai</a>
        <div class="nav-lesson" id="navLesson" style="display:none"></div>
        <div class="nav-dropdown" id="navDropdown" style="display:none">
            <button class="nav-dropdown-trigger" id="navDropdownTrigger">
                <span id="navContextLabel"></span><span class="nav-dropdown-caret">▾</span>
            </button>
            <div class="nav-dropdown-menu" id="navDropdownMenu">
                <a class="nav-dropdown-item" id="navMyPage" href="/#page=me"></a>
                <a class="nav-dropdown-item" id="navGroupPage" href="/" style="display:none"></a>
                <button class="nav-dropdown-item nav-dropdown-logout" id="navLogoutBtn">Kijelentkezés</button>
            </div>
        </div>
    </nav>

    <div class="page-content admin-content">
        <a href="/admin" class="back-link">← Adminisztráció</a>
        <div class="lessons-header">
            <h1>Órák</h1>
            <button class="admin-btn save-btn" id="newLessonBtn">+ Új óra</button>
        </div>
        <div class="auth-error" id="lessonsError" style="display:none"></div>
        <div id="lessonsList"><p class="loading">Betöltés...</p></div>
    </div>

    <!-- Lesson editor modal (create / edit / remix) -->
    <div id="lessonModal" class="modal-overlay" style="display:none">
        <div class="modal lesson-modal">
            <h2 class="modal-title" id="lessonModalTitle">Új óra létrehozása</h2>

            <div class="modal-field">
                <label class="modal-label">Név</label>
                <input id="lessonName" class="admin-input" type="text" placeholder="pl. Matematika — 6B">
            </div>

            <div class="modal-row">
                <div class="modal-field">
                    <label class="modal-label">Max üzenetek / chat</label>
                    <input id="lessonMaxMessages" class="admin-input" type="number" min="1" max="999" value="60">
                </div>
                <div class="modal-field">
                    <label class="modal-label">Max personák / felhasználó</label>
                    <input id="lessonMaxPersonas" class="admin-input" type="number" min="1" max="100" value="20">
                </div>
            </div>

            <div class="modal-row">
                <div class="modal-field">
                    <label class="modal-label">AI modell</label>
                    <div class="model-select" id="lessonAiModelSelect">
                        <button type="button" class="model-select-trigger admin-input" id="lessonAiModelTrigger">
                            <span id="lessonAiModelLabel">Gemini 2.5 Flash Lite</span>
                            <span class="model-select-caret">▾</span>
                        </button>
                        <div class="model-select-menu" id="lessonAiModelMenu">
                            <div class="model-select-option" data-value="google/gemini-2.5-flash-lite"
                                data-tooltip="Leggyorsabb és legolcsóbb. Egyszerű feladatokra elegendő, de gyengébb minőség.">Gemini 2.5 Flash Lite</div>
                            <div class="model-select-option" data-value="google/gemini-2.5-flash"
                                data-tooltip="Gyors és megbízható. Ajánlott alapértelmezett — jó egyensúly ár és minőség között.">Gemini 2.5 Flash</div>
                            <div class="model-select-option" data-value="google/gemini-2.5-pro"
                                data-tooltip="A Gemini legjobb minősége. Összetett, kreatív feladatokhoz — lassabb és drágább.">Gemini 2.5 Pro</div>
                            <div class="model-select-option" data-value="openai/gpt-4.1-nano"
                                data-tooltip="A legolcsóbb OpenAI modell. Nagy mennyiségű, egyszerű feladatokhoz.">GPT-4.1 Nano</div>
                            <div class="model-select-option" data-value="openai/gpt-4.1-mini"
                                data-tooltip="Gyors és olcsó OpenAI modell. Jó minőség alapfeladatokhoz.">GPT-4.1 Mini</div>
                            <div class="model-select-option" data-value="openai/gpt-4.1"
                                data-tooltip="Az OpenAI egyik legerősebb modellje. Kiváló minőség, de drágább.">GPT-4.1</div>
                            <div class="model-select-option" data-value="anthropic/claude-haiku-4.5"
                                data-tooltip="Gyors és olcsó Anthropic modell. Hőmérséklet max. 1.">Claude Haiku 4.5</div>
                            <div class="model-select-option" data-value="anthropic/claude-sonnet-4.5"
                                data-tooltip="Erős Anthropic modell. Hőmérséklet max. 1.">Claude Sonnet 4.5</div>
                            <div class="model-select-option" data-value="anthropic/claude-sonnet-4.6"
                                data-tooltip="Az Anthropic legújabb Sonnet modellje. Legjobb minőség a listában. Hőmérséklet max. 1.">Claude Sonnet 4.6</div>
                        </div>
                    </div>
                    <input type="hidden" id="lessonAiModel" value="google/gemini-2.5-flash-lite">
                </div>
                <div class="modal-field">
                    <label class="modal-label">AI hőmérséklet <span class="modal-label-info" data-tooltip="0 = kiszámítható, szó szerint követi az utasításokat. 1 = kreatív és változatos.">ⓘ</span></label>
                    <input id="lessonAiTemperature" class="admin-input" type="number" min="0" max="1" step="0.1" value="1.0">
                </div>
            </div>

            <div class="modal-field">
                <label class="modal-label">Perszóna sablon</label>
                <div class="modal-hint">Változók: <code>{name}</code>, <code>{short}</code>, <code>{long}</code></div>
                <textarea id="lessonSystemPrompt" class="admin-textarea" rows="12"></textarea>
            </div>

            <div class="auth-error" id="lessonModalError" style="display:none"></div>
            <div class="modal-actions">
                <button id="lessonSubmitBtn" class="admin-btn save-btn">Létrehozás</button>
                <button id="lessonCancelBtn" class="admin-btn cancel-btn">Mégse</button>
            </div>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/lessons_admin.js"></script>
</body>
</html>
