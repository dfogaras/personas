<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personas</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="#page=personas" class="nav-brand">AI Personas</a>
        <div class="nav-user" id="navUser" style="display:none">
            <span class="nav-user-name" id="navUserName"></span>
            <button class="nav-logout-btn" id="navLogoutBtn">Kijelentkezés</button>
        </div>
    </nav>

    <!-- Personas list page -->
    <div id="page-personas" class="page">
        <div class="page-content">
            <div class="page-header">
                <h1 id="personasPageTitle">Personák</h1>
            </div>
            <div id="personasList" class="personas-grid">
                <p class="loading">Betöltés...</p>
            </div>
            <div id="createPersonaForm" class="create-form" style="display:none">
                <input type="text" id="newPersonaName" placeholder="Név" class="form-input" />
                <textarea id="newPersonaDescription" placeholder="Leírás" class="form-input" rows="3"></textarea>
                <input type="text" id="newPersonaSpecialty" placeholder="Szakterület (nem kötelező)" class="form-input" />
                <div class="form-actions">
                    <button id="createPersonaBtn" class="btn-primary">Létrehozás</button>
                    <button id="cancelCreateBtn" class="btn-secondary">Mégse</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Session page (handles both new and existing sessions) -->
    <div id="page-session" class="page session-page">
        <div class="chat-area">
            <header class="chat-header">
                <div class="chat-header-left">
                    <a id="backToPersona" href="#page=personas" class="back-link-inline">←</a>
                    <div>
                        <h2 id="sessionPersonaName"></h2>
                        <p id="sessionPersonaSpecialty" class="specialty"></p>
                    </div>
                </div>
                <p id="sessionUserName2" class="user-name-display"></p>
            </header>
            <!-- Name prompt: shown when starting a new session -->
            <div id="sessionNamePrompt" class="session-name-prompt" style="display:none">
                <div class="name-prompt-card">
                    <p class="name-prompt-label">Mi a neved?</p>
                    <input type="text" id="chatUserName" placeholder="Neved" class="form-input" />
                    <button id="chatStartBtn" class="btn-primary" disabled>Chat indítása</button>
                </div>
            </div>
            <!-- Chat UI: shown for existing sessions -->
            <div id="messagesList" class="messages-list" style="display:none"></div>
            <div id="chatInputArea" class="chat-input-area" style="display:none">
                <form id="messageForm" class="message-form">
                    <input type="text" id="messageInput" placeholder="Írj üzenetet..." autocomplete="off" />
                    <button type="submit" class="send-btn">Küldés</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
