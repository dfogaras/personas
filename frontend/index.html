<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personas</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="#page=personas" class="nav-brand">AI Personas</a>
        <div class="nav-user" id="navUser" style="display:none">
            <span class="nav-user-name" id="navUserName"></span>
            <button class="nav-logout-btn" id="navLogoutBtn">Sign out</button>
        </div>
    </nav>

    <!-- Personas list page -->
    <div id="page-personas" class="page">
        <div class="page-content">
            <div class="page-header">
                <h1 id="personasPageTitle">Personas</h1>
            </div>
            <div id="personasList" class="personas-grid">
                <p class="loading">Loading...</p>
            </div>
            <div id="createPersonaForm" class="create-form" style="display:none">
                <input type="text" id="newPersonaName" placeholder="Name" class="form-input" />
                <textarea id="newPersonaDescription" placeholder="Description" class="form-input" rows="3"></textarea>
                <input type="text" id="newPersonaSpecialty" placeholder="Specialty (optional)" class="form-input" />
                <div class="form-actions">
                    <button id="createPersonaBtn" class="btn-primary">Create</button>
                    <button id="cancelCreateBtn" class="btn-secondary">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Persona detail page -->
    <div id="page-persona" class="page">
        <div class="page-content">
            <a href="#page=personas" class="back-link">← Back to Personas</a>
            <div class="persona-detail-header">
                <div>
                    <h1 id="detailPersonaName"></h1>
                    <p id="detailPersonaSpecialty" class="specialty"></p>
                </div>
                <div class="persona-detail-actions"></div>
            </div>
            <p id="detailPersonaDescription" class="detail-description"></p>
            <div id="personaSessionsList" class="persona-sessions-list"></div>
        </div>
    </div>

""    <!-- Session page (handles both new and existing sessions) -->
    <div id="page-session" class="page session-page">
        <div class="chat-area">
            <header class="chat-header">
                <div class="chat-header-left">
                    <a id="backToPersona" href="#page=personas" class="back-link-inline">←</a>
                    <div>
                        <h2 id="sessionPersonaName"></h2>
                        <p id="sessionPersonaSpecialty" class="specialty"></p>
                    </div>
                </div>
                <p id="sessionUserName2" class="user-name-display"></p>
            </header>
            <div id="sessionPersonaDescription" class="persona-description"></div>
            <!-- Name prompt: shown when starting a new session -->
            <div id="sessionNamePrompt" class="session-name-prompt" style="display:none">
                <div class="name-prompt-card">
                    <p class="name-prompt-label">What's your name?</p>
                    <input type="text" id="chatUserName" placeholder="Your name" class="form-input" />
                    <button id="chatStartBtn" class="btn-primary" disabled>Start Chat</button>
                </div>
            </div>
            <!-- Chat UI: shown for existing sessions -->
            <div id="messagesList" class="messages-list" style="display:none"></div>
            <div id="chatInputArea" class="chat-input-area" style="display:none">
                <form id="messageForm" class="message-form">
                    <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" />
                    <button type="submit" class="send-btn">Send</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Login page -->
    <div id="page-login" class="page">
        <div class="page-content page-content-narrow">
            <div class="auth-card">
                <h1 class="auth-title">Sign in</h1>
                <p class="auth-subtitle">Enter your email to receive a login code.</p>
                <input type="email" id="loginEmail" placeholder="you@example.com" class="form-input" />
                <div class="auth-error" id="loginError" style="display:none"></div>
                <button id="loginBtn" class="btn-primary">Send code</button>
            </div>
        </div>
    </div>

    <!-- Verify page -->
    <div id="page-verify" class="page">
        <div class="page-content page-content-narrow">
            <div class="auth-card">
                <h1 class="auth-title">Enter code</h1>
                <p class="auth-subtitle" id="verifySubtitle">Check the server log for your 6-digit code.</p>
                <input type="text" id="verifyCode" placeholder="123456" class="form-input" maxlength="6" />
                <div class="auth-error" id="verifyError" style="display:none"></div>
                <button id="verifyBtn" class="btn-primary">Verify</button>
                <a href="#page=login" class="auth-back-link">← Use a different email</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
