<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎭</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="#page=personas" class="nav-brand">AI Personas</a>
        <div class="nav-user" id="navUser" style="display:none">
            <span class="nav-user-name" id="navUserName"></span>
            <button class="nav-logout-btn" id="navLogoutBtn">Kijelentkezés</button>
        </div>
    </nav>

    <!-- Personas list page -->
    <div id="page-personas" class="page">
        <div class="page-content">
            <div class="page-header">
                <h1 id="personasPageTitle">Personák</h1>
            </div>
            <div id="personasList" class="personas-grid">
                <p class="loading">Betöltés...</p>
            </div>
            <div id="createPersonaForm" class="create-form" style="display:none">
                <input type="text" id="newPersonaName" placeholder="Név" class="form-input" />
                <textarea id="newPersonaDescription" placeholder="Leírás" class="form-input" rows="3"></textarea>
                <input type="text" id="newPersonaSpecialty" placeholder="Szakterület (nem kötelező)" class="form-input" />
                <div class="form-actions">
                    <button id="createPersonaBtn" class="btn-primary">Létrehozás</button>
                    <button id="cancelCreateBtn" class="btn-secondary">Mégse</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
