<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — AI Personas</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="top-nav">
        <span class="nav-brand">AI Personas</span>
    </nav>

    <div class="page-content page-content-narrow">
        <div class="auth-card">
            <h1 class="auth-title">Sign in</h1>
            <input type="email" id="loginEmail" placeholder="Email" class="form-input" />
            <input type="password" id="loginPassword" placeholder="Password" class="form-input" />
            <div class="auth-error" id="loginError" style="display:none"></div>
            <button id="loginBtn" class="btn-primary">Sign in</button>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
