<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin főoldal — kincskereso.ai</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎭</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-brand">kincskereso.ai</a>
        <div class="nav-lesson" id="navLesson" style="display:none"></div>
        <div class="nav-dropdown" id="navDropdown" style="display:none">
            <button class="nav-dropdown-trigger" id="navDropdownTrigger">
                <span id="navContextLabel"></span><span class="nav-dropdown-caret">▾</span>
            </button>
            <div class="nav-dropdown-menu" id="navDropdownMenu">
                <a class="nav-dropdown-item" id="navMyPage" href="/#page=me"></a>
                <a class="nav-dropdown-item" id="navLessonPage" href="/" style="display:none"></a>
                <a class="nav-dropdown-item" id="navGeneralAdminPage" href="/" style="display:none"></a>
                <a class="nav-dropdown-item" id="navLessonsAdminPage" href="/" style="display:none"></a>
                <button class="nav-dropdown-item nav-dropdown-logout" id="navLogoutBtn">Kijelentkezés</button>
            </div>
        </div>
    </nav>

    <div class="page-content admin-content">
<div class="auth-error" id="adminError" style="display:none"></div>
        <section>
            <h2 class="admin-section-title">Felhasználók</h2>
            <div id="usersTables"><p class="loading">Betöltés...</p></div>
        </section>
<section style="margin-top: 2rem;">
            <h2 class="admin-section-title">Általános</h2>
            <div class="general-row">
                <span class="general-label">Biztonsági mentés</span>
                <button class="admin-btn save-btn" id="dbExportBtn">Adatbázis letöltése (.zip)</button>
            </div>
            <div class="general-row">
                <span class="general-label">OpenRouter kredit</span>
                <div id="usageCredit" class="usage-credit"></div>
            </div>
            <div id="usageContent" style="margin-top: 0.75rem;"><p class="loading">Betöltés...</p></div>
        </section>
    </div>

    <!-- Single add modal -->
    <div id="addModal" class="modal-overlay" style="display:none">
        <div class="modal">
            <h2 class="modal-title">Felhasználó hozzáadása — <span id="addGroupLabel"></span></h2>
            <div class="modal-field">
                <label class="modal-label">E-mail</label>
                <input id="addEmail" class="admin-input" placeholder="nev@kincskereso-iskola.hu">
            </div>
            <div class="modal-field">
                <label class="modal-label">Név</label>
                <input id="addName" class="admin-input" placeholder="Kovács Anna">
            </div>
            <div class="modal-field">
                <label class="modal-label">Kezdő jelszó</label>
                <input id="addPassword" class="admin-input" placeholder="(nincs)">
            </div>
            <div class="auth-error" id="addError" style="display:none"></div>
            <div class="modal-actions">
                <button id="addSubmitBtn" class="admin-btn save-btn">Hozzáadás</button>
                <button id="addCancelBtn" class="admin-btn cancel-btn">Mégse</button>
            </div>
        </div>
    </div>

    <!-- Bulk add modal -->
    <div id="bulkModal" class="modal-overlay" style="display:none">
        <div class="modal">
            <h2 class="modal-title">Tömeges hozzáadás — <span id="bulkGroupLabel"></span></h2>
            <div class="modal-row">
                <div class="modal-field">
                    <label class="modal-label">E-mail domain</label>
                    <input id="bulkDomain" class="admin-input" value="kincskereso-iskola.hu">
                </div>
                <div class="modal-field">
                    <label class="modal-label">Kezdő jelszó</label>
                    <input id="bulkPassword" class="admin-input" placeholder="(nincs)">
                </div>
            </div>
            <label class="modal-label">Nevek (soronként egy)</label>
            <textarea id="bulkNames" class="admin-textarea" rows="8" placeholder="Kovács Anna&#10;Tóth Péter"></textarea>
            <div id="bulkPreview" class="bulk-preview"></div>
            <div class="auth-error" id="bulkError" style="display:none"></div>
            <div class="modal-actions">
                <button id="bulkAddBtn" class="admin-btn save-btn">Mind hozzáadása</button>
                <button id="bulkCancelBtn" class="admin-btn cancel-btn">Mégse</button>
            </div>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
