<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set password — AI Personas</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="top-nav">
        <span class="nav-brand">AI Personas</span>
    </nav>

    <div class="page-content page-content-narrow">
        <div class="auth-card">
            <h1 class="auth-title">Set your password</h1>
            <p class="auth-subtitle">Your account has a temporary password. Please set a permanent one.</p>
            <input type="password" id="cpCurrent" placeholder="Current (temporary) password" class="form-input" />
            <input type="password" id="cpNew" placeholder="New password" class="form-input" />
            <input type="password" id="cpRepeat" placeholder="Repeat new password" class="form-input" />
            <div class="auth-error" id="cpError" style="display:none"></div>
            <button id="cpBtn" class="btn-primary">Set password</button>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/change-password.js"></script>
</body>
</html>
