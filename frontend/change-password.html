<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelszócsere — AI Personas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎭</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="top-nav">
        <span class="nav-brand">AI Personas</span>
    </nav>

    <div class="page-content page-content-narrow">
        <div class="auth-card">
            <h1 class="auth-title">Jelszócsere</h1>
            <p class="auth-subtitle">Ideiglenes jelszóval léptél be. Kérjük, állíts be saját jelszót.</p>
            <input type="password" id="cpCurrent" placeholder="Jelenlegi (ideiglenes) jelszó" class="form-input" />
            <input type="password" id="cpNew" placeholder="Új jelszó" class="form-input" />
            <input type="password" id="cpRepeat" placeholder="Új jelszó megerősítése" class="form-input" />
            <div class="auth-error" id="cpError" style="display:none"></div>
            <button id="cpBtn" class="btn-primary">Jelszó beállítása</button>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/change-password.js"></script>
</body>
</html>
