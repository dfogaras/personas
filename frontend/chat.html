<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — kincskereso.ai</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-theme="chat">
    <nav class="top-nav">
        <a href="/" class="nav-brand">kincskereso.ai</a>
        <div class="nav-links" id="navLinks"></div>
        <div class="nav-lesson" id="navLesson" style="display:none"></div>
        <div class="nav-dropdown" id="navDropdown" style="display:none">
            <button class="nav-dropdown-trigger" id="navDropdownTrigger">
                <span id="navContextLabel"></span><span class="nav-dropdown-caret">▾</span>
            </button>
            <div class="nav-dropdown-menu" id="navDropdownMenu">
                <a class="nav-dropdown-item" id="navMyPage" href="/#page=me"></a>
                <a class="nav-dropdown-item" id="navLessonPage" href="/" style="display:none"></a>
                <a class="nav-dropdown-item" id="navGeneralAdminPage" href="/" style="display:none"></a>
                <a class="nav-dropdown-item" id="navLessonsAdminPage" href="/" style="display:none"></a>
                <button class="nav-dropdown-item nav-dropdown-logout" id="navLogoutBtn">Kijelentkezés</button>
            </div>
        </div>
    </nav>
    <div class="chat-page">
        <div class="chat-area">
            <header class="chat-header">
                <div class="chat-header-left">
                    <div id="chatPersonaMeta" class="chat-persona-link"></div>
                </div>
                <div class="chat-header-right">
                    <div class="user-name-display">
                        <p id="chatUserName"></p>
                        <p id="chatUserEmail"></p>
                        <p id="chatTimes" class="chat-times"></p>
                    </div>
                </div>
            </header>
            <div id="messagesList" class="messages-list"></div>
            <div class="chat-input-area">
                <form id="messageForm" class="message-form">
                    <input type="text" id="messageInput" placeholder="Írj üzenetet..." autocomplete="off" />
                    <div id="chatSettingsStack" class="chat-settings-stack" style="display:none">
                        <div id="chatModelSetting" class="chat-model-select" style="display:none">
                            <button type="button" class="chat-setting-select" id="chatModelTrigger">
                                <span id="chatModelLabel"></span><span class="chat-select-caret">▾</span>
                            </button>
                            <div class="chat-model-menu" id="chatModelMenu"></div>
                        </div>
                        <select id="chatTempSelect" class="chat-setting-select" style="display:none" title="Hangnem">
                            <option value="0">🎯 Precíz</option>
                            <option value="1">📚 Kiegyensúlyozott</option>
                            <option value="2">✨ Kreatív</option>
                            <option value="3">🎲 Kiszámíthatatlan</option>
                        </select>
                    </div>
                    <button type="submit" class="send-btn" title="Küldés">➤</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/i18n.js?v=10"></script>
    <script src="/static/js/common.js?v=10"></script>
    <script src="/static/js/chat.js?v=15"></script>
</body>
</html>
