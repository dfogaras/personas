<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — AI Personas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎭</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-theme="chat">
    <nav class="top-nav">
        <a href="/" class="nav-brand">AI Personas</a>
        <div class="nav-user" id="navUser" style="display:none">
            <button class="nav-user-name" id="navUserName"></button>
            <button class="nav-logout-btn" id="navLogoutBtn">Kijelentkezés</button>
        </div>
    </nav>
    <div class="chat-page">
        <div class="chat-area">
            <header class="chat-header">
                <div class="chat-header-left">
                    <div id="chatPersonaMeta" class="chat-persona-link"></div>
                </div>
                <div class="chat-header-right">
                    <div class="user-name-display">
                        <p id="chatUserName"></p>
                        <p id="chatUserEmail"></p>
                        <p id="chatTimes" class="chat-times"></p>
                    </div>
                </div>
            </header>
            <div id="messagesList" class="messages-list"></div>
            <div class="chat-input-area">
                <form id="messageForm" class="message-form">
                    <input type="text" id="messageInput" placeholder="Írj üzenetet..." autocomplete="off" />
                    <button type="submit" class="send-btn" title="Küldés">➤</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/i18n.js?v=5"></script>
    <script src="/static/js/common.js?v=5"></script>
    <script src="/static/js/chat.js?v=11"></script>
</body>
</html>
