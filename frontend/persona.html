<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona — kincskereso.ai</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎭</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-theme="persona">
    <nav class="top-nav">
        <a href="/" class="nav-brand">kincskereso.ai</a>
        <div class="nav-links" id="navLinks"></div>
        <div class="nav-lesson" id="navLesson" style="display:none"></div>
        <div class="nav-dropdown" id="navDropdown" style="display:none">
            <button class="nav-dropdown-trigger" id="navDropdownTrigger">
                <span id="navContextLabel"></span><span class="nav-dropdown-caret">▾</span>
            </button>
            <div class="nav-dropdown-menu" id="navDropdownMenu">
                <a class="nav-dropdown-item" id="navMyPage" href="/#page=me"></a>
                <a class="nav-dropdown-item" id="navLessonPage" href="/" style="display:none"></a>
                <a class="nav-dropdown-item" id="navGeneralAdminPage" href="/" style="display:none"></a>
                <a class="nav-dropdown-item" id="navLessonsAdminPage" href="/" style="display:none"></a>
                <button class="nav-dropdown-item nav-dropdown-logout" id="navLogoutBtn">Kijelentkezés</button>
            </div>
        </div>
    </nav>

    <!-- View mode -->
    <div id="viewMode" class="page-content" style="display:none">
        <a href="/" class="back-link">← Vissza</a>
        <div class="persona-detail-header">
            <div id="personaMeta"></div>
            <div id="personaActions" class="persona-detail-actions"></div>
        </div>
        <p id="personaDescription" class="detail-description"></p>
        <div id="chatsList" class="persona-chats-list"></div>
    </div>

    <!-- Edit / Remix mode -->
    <div id="editMode" class="page-content" style="display:none">
        <a href="/" class="back-link" id="editBackLink">← Vissza</a>
        <h1 id="formTitle"></h1>
        <div class="create-form">
            <label class="form-label" for="pName">Név</label>
            <input type="text" id="pName" class="form-input" placeholder="pl. Bettina" maxlength="80" />
            <label class="form-label" for="pSpec">Cím</label>
            <div class="form-field">
                <input type="text" id="pSpec" class="form-input form-input-with-counter" placeholder="pl. laza, kreatív info tanár" maxlength="40" />
                <span class="form-char-counter" id="pSpecCounter">0 / 60</span>
            </div>
            <label class="form-label" for="pDesc">Leírás</label>
            <div id="descPrompts" class="desc-prompts"></div>
            <textarea id="pDesc" class="form-input" rows="5"></textarea>
            <div class="ai-feedback-wrap">
                <button id="aiFeedbackBtn" class="btn-ai-feedback" type="button">✨ Visszajelzés kérése</button>
            </div>
            <div class="auth-error" id="formError" style="display:none"></div>
            <div class="form-actions">
                <button id="submitBtn" class="btn-primary">✓</button>
                <button id="cancelBtn" class="btn-secondary">✕</button>
            </div>
        </div>
    </div>

    <!-- AI feedback floating panel -->
    <div id="aiFeedbackBox" class="ai-feedback-panel" style="display:none">
        <div class="ai-feedback-header">
            <span class="ai-feedback-title">🤖 AI visszajelzés</span>
            <button class="ai-feedback-close" id="aiFeedbackClose" type="button">✕</button>
        </div>
        <div id="aiFeedbackContent" class="ai-feedback-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/i18n.js?v=10"></script>
    <script src="/static/js/common.js?v=10"></script>
    <script src="/static/js/persona.js?v=10"></script>
</body>
</html>
